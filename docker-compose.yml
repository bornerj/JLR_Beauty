services:
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jlrbeauty}
      POSTGRES_USER: ${POSTGRES_USER:-jlrbeauty}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_API_RW_PASSWORD: ${DB_API_RW_PASSWORD:-JLRapiRW_Dev2026!}
      DB_API_RO_PASSWORD: ${DB_API_RO_PASSWORD:-JLRapiRO_Dev2026!}
    command: >
      postgres
      -c shared_preload_libraries=pgaudit
      -c pgaudit.log=ddl,role
      -c pgaudit.log_catalog=off
      -c log_connections=on
      -c log_disconnections=on
      -c log_min_duration_statement=2000
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-api-users.sh:/docker-entrypoint-initdb.d/01-init-api-users.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jlrbeauty} -d ${POSTGRES_DB:-jlrbeauty}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
        VITE_WEB_URL: ${APP_WEB_URL:-}
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/:/etc/nginx/conf.d/:ro
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started

volumes:
  postgres_data:
  uploads_data:
